<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人主頁 | My GitHub Profile</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            scroll-behavior: smooth;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass-effect {
            background: rgba(17, 24, 39, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-300">

    <!-- 導覽列 (Navbar) -->
    <nav class="fixed top-0 w-full z-50 glass-effect">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="text-xl font-bold tracking-tighter text-primary">PORTFOLIO</div>
            <div class="flex items-center space-x-6">
                <a href="#about" class="hover:text-primary transition">關於</a>
                <a href="#projects" class="hover:text-primary transition">專案</a>
                <a href="#contact" class="hover:text-primary transition">聯絡</a>
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition">
                    <i data-lucide="sun" class="hidden dark:block w-5 h-5"></i>
                    <i data-lucide="moon" class="block dark:hidden w-5 h-5"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- 英雄區塊 (Hero Section) -->
    <section id="about" class="pt-32 pb-20 px-4">
        <div class="max-w-4xl mx-auto text-center">
            <div class="mb-8 inline-block relative">
                <div class="w-32 h-32 rounded-full bg-gradient-to-tr from-primary to-purple-500 flex items-center justify-center text-white text-4xl font-bold shadow-xl">
                    ?
                </div>
                <div class="absolute bottom-0 right-0 w-8 h-8 bg-green-500 border-4 border-white dark:border-slate-950 rounded-full"></div>
            </div>
            <h1 class="text-4xl md:text-6xl font-bold mb-4 tracking-tight">你好，我是 <span class="text-primary">[您的名字]</span></h1>
            <p class="text-lg md:text-xl text-slate-600 dark:text-slate-400 mb-8 max-w-2xl mx-auto">
                一位熱衷於軟體開發與技術探索的開發者。喜歡解決複雜問題，並專注於建立高效、乾淨的程式碼。
            </p>
            <div class="flex flex-wrap justify-center gap-4">
                <div class="flex items-center space-x-2 px-4 py-2 bg-white dark:bg-slate-900 rounded-lg shadow-sm border border-slate-200 dark:border-slate-800">
                    <i data-lucide="cpu" class="w-5 h-5 text-orange-500"></i>
                    <span>[處理器型號]</span>
                </div>
                <div class="flex items-center space-x-2 px-4 py-2 bg-white dark:bg-slate-900 rounded-lg shadow-sm border border-slate-200 dark:border-slate-800">
                    <i data-lucide="monitor" class="w-5 h-5 text-blue-500"></i>
                    <span>[顯示卡型號]</span>
                </div>
            </div>
        </div>
    </section>

    <!-- 技術棧 (Tech Stack) -->
    <section class="py-16 bg-slate-100 dark:bg-slate-900/50">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <h2 class="text-2xl font-bold mb-10 text-slate-500 uppercase tracking-widest">技術能力 (Skills)</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-8">
                <div class="flex flex-col items-center p-6 bg-white dark:bg-slate-800 rounded-2xl shadow-sm hover:shadow-md transition">
                    <div class="w-12 h-12 mb-4 text-yellow-500"><i data-lucide="code-2" class="w-full h-full"></i></div>
                    <span class="font-medium">語言 A</span>
                </div>
                <div class="flex flex-col items-center p-6 bg-white dark:bg-slate-800 rounded-2xl shadow-sm hover:shadow-md transition">
                    <div class="w-12 h-12 mb-4 text-slate-500"><i data-lucide="terminal" class="w-full h-full"></i></div>
                    <span class="font-medium">語言 B</span>
                </div>
                <div class="flex flex-col items-center p-6 bg-white dark:bg-slate-900 rounded-2xl shadow-sm hover:shadow-md transition">
                    <div class="w-12 h-12 mb-4 text-blue-400"><i data-lucide="layers" class="w-full h-full"></i></div>
                    <span class="font-medium">技術領域 C</span>
                </div>
                <div class="flex flex-col items-center p-6 bg-white dark:bg-slate-800 rounded-2xl shadow-sm hover:shadow-md transition">
                    <div class="w-12 h-12 mb-4 text-purple-500"><i data-lucide="git-branch" class="w-full h-full"></i></div>
                    <span class="font-medium">版本控制</span>
                </div>
            </div>
        </div>
    </section>

    <!-- 專案區塊 (Projects Section) -->
    <section id="projects" class="py-20 px-4">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-end mb-12">
                <div>
                    <h2 class="text-3xl font-bold mb-2">精選專案 (Projects)</h2>
                    <p class="text-slate-600 dark:text-slate-400">以下是我近期參與的開發專案。</p>
                </div>
                <a href="#" class="text-primary hover:underline flex items-center">
                    查看全部 <i data-lucide="chevron-right" class="w-4 h-4 ml-1"></i>
                </a>
            </div>

            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- 專案卡片範例 -->
                <div class="group bg-white dark:bg-slate-900 rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-800 hover:border-primary/50 transition duration-300">
                    <div class="h-48 bg-slate-200 dark:bg-slate-800 flex items-center justify-center text-slate-400">
                        <i data-lucide="folder-code" class="w-12 h-12 group-hover:scale-110 transition duration-300"></i>
                    </div>
                    <div class="p-6">
                        <div class="flex items-center justify-between mb-3">
                            <span class="text-xs font-bold px-2 py-1 bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400 rounded">技術標籤</span>
                            <div class="flex space-x-2 text-slate-400">
                                <i data-lucide="star" class="w-4 h-4"></i>
                                <i data-lucide="git-fork" class="w-4 h-4"></i>
                            </div>
                        </div>
                        <h3 class="text-xl font-bold mb-2 group-hover:text-primary transition">專案名稱</h3>
                        <p class="text-slate-600 dark:text-slate-400 text-sm mb-4">在這裡輸入專案的簡短描述，介紹其核心功能與解決的問題。</p>
                        <div class="flex space-x-4">
                            <a href="#" class="text-sm font-medium flex items-center hover:opacity-70"><i data-lucide="github" class="w-4 h-4 mr-1"></i> Code</a>
                            <a href="#" class="text-sm font-medium flex items-center hover:opacity-70"><i data-lucide="external-link" class="w-4 h-4 mr-1"></i> Demo</a>
                        </div>
                    </div>
                </div>

                <!-- 專案預留位 -->
                <div class="group bg-white dark:bg-slate-900 rounded-2xl border-2 border-dashed border-slate-300 dark:border-slate-700 flex items-center justify-center p-12 hover:border-primary transition cursor-pointer">
                    <div class="text-center">
                        <i data-lucide="plus" class="w-8 h-8 mx-auto text-slate-400 mb-2"></i>
                        <p class="text-slate-400 font-medium">新增你的專案</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 聯絡區塊 (Contact) -->
    <footer id="contact" class="py-20 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <h2 class="text-3xl font-bold mb-6">保持聯絡</h2>
            <p class="text-slate-600 dark:text-slate-400 mb-10">如果您有任何合作意向，歡迎透過以下平台與我聯絡。</p>
            <div class="flex justify-center space-x-8 mb-12">
                <a href="#" class="p-4 bg-slate-100 dark:bg-slate-800 rounded-full hover:scale-110 transition text-slate-600 dark:text-slate-300 hover:text-primary">
                    <i data-lucide="github" class="w-6 h-6"></i>
                </a>
                <a href="#" class="p-4 bg-slate-100 dark:bg-slate-800 rounded-full hover:scale-110 transition text-slate-600 dark:text-slate-300 hover:text-primary">
                    <i data-lucide="mail" class="w-6 h-6"></i>
                </a>
            </div>
            <div class="text-sm text-slate-500">
                &copy; 2026 [您的姓名]. Made with <i data-lucide="heart" class="inline w-3 h-3 text-red-500"></i>.
            </div>
        </div>
    </footer>

    <script>
        // 初始化圖示 (Lucide Icons)
        lucide.createIcons();

        // 深色模式切換邏輯
        const themeToggle = document.getElementById('theme-toggle');
        const html = document.documentElement;

        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            html.classList.add('dark');
        }

        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
        });

        window.addEventListener('scroll', () => {
            const nav = document.querySelector('nav');
            if (window.scrollY > 50) {
                nav.classList.add('shadow-md');
            } else {
                nav.classList.remove('shadow-md');
            }
        });
    </script>
</body>
</html>
