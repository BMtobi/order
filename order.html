<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>叫貨小幫手 (多廠商版)</title>
    <!-- 引入 SortableJS 處理拖曳排序 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
    <style>
        /* 深色模式基底 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #000000; 
            margin: 0; 
            padding: 20px; 
            color: #ffffff; 
        }
        
        h2 { 
            text-align: center; 
            margin-top: 5px;
            margin-bottom: 15px; 
            font-size: 1.2rem; 
            color: #8e8e93; 
        }

        /* --- 廠商切換區塊 --- */
        .vendor-header {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }
        .vendor-header select {
            flex: 1;
            background: #1c1c1e;
            color: #FFD60A;
            border: 1px solid #3a3a3c;
            padding: 10px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            outline: none;
            -webkit-appearance: none;
        }
        .btn-vendor {
            background: #2c2c2e;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .btn-vendor.del { color: #ff453a; }
        
        /* 卡片樣式 */
        .card { 
            background: #1c1c1e; 
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 12px; 
            border: 1px solid #2c2c2e;
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        .card.sortable-ghost { opacity: 0.4; background: #2c2c2e; }
        
        /* 第一行：名稱與拖曳手把 */
        .row-top { display: flex; justify-content: space-between; align-items: center; }
        .row-item { flex: 1; }
        .row-item input { 
            width: 100%; border: none; font-size: 1.3rem; font-weight: 700; 
            color: #FFD60A; outline: none; background: transparent; 
        }
        .row-item input::placeholder { color: #555; }

        .drag-handle {
            color: #8e8e93; font-size: 1.8rem; padding: 0 0 0 15px;
            cursor: grab; touch-action: none; user-select: none;
            display: flex; align-items: center; justify-content: center;
        }
        .drag-handle:active { cursor: grabbing; color: #ffffff; }

        /* 第二行：數量控制區 */
        .row-qty { 
            display: flex; align-items: center; justify-content: space-between; 
            background: #2c2c2e; border-radius: 8px; padding: 6px; 
        }
        
        .btn-qty { 
            width: 44px; height: 44px; border: none; background: #3a3a3c; 
            border-radius: 8px; font-size: 1.4rem; font-weight: bold; color: #0a84ff; cursor: pointer; 
        }
        .btn-qty:active { background: #48484a; }
        
        /* --- 視覺重點優化：數量方塊 --- */
        .qty-display { 
            font-size: 1.8rem; 
            font-weight: 900; 
            width: 75px; 
            text-align: center; 
            background: #000000; /* 黑底讓數字凸顯 */
            border: 2px solid;
            border-radius: 8px;
            padding: 4px 0;
            transition: all 0.2s ease-in-out;
        }
        /* 有數量的狀態 (螢光綠亮起) */
        .qty-display.active {
            color: #32d74b;
            border-color: #32d74b;
            box-shadow: 0 0 12px rgba(50, 215, 75, 0.25);
        }
        /* 數量為零的狀態 (暗灰) */
        .qty-display.inactive {
            color: #8e8e93;
            border-color: #3a3a3c;
            box-shadow: none;
        }

        /* 第三行：價格、單位與刪除 */
        .row-meta { display: flex; align-items: center; gap: 8px; }
        .meta-input { 
            border: 1px solid #3a3a3c; background: #2c2c2e; color: #aeaeae; 
            border-radius: 6px; padding: 10px; font-size: 1rem; text-align: center; 
            -webkit-appearance: none; outline: none;
        }
        .meta-input.price { width: 60px; }
        .meta-input.unit { flex: 1; }
        .currency-label { color: #8e8e93; font-size: 0.9rem; }
        
        .btn-del { 
            color: #ff453a; background: none; border: none; font-size: 0.95rem; 
            padding: 8px; cursor: pointer; 
        }

        /* 底部懸浮功能區 */
        .controls { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(28, 28, 30, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 15px; border-top: 1px solid #38383a; 
            padding-bottom: max(15px, env(safe-area-inset-bottom));
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
        }
        .btn { padding: 12px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .btn-reset { background: #3a3a3c; color: #ff453a; }
        .btn-import { background: #5e5ce6; color: white; }
        .btn-add { background: #3a3a3c; color: #0a84ff; }
        .btn-copy { background: #0a84ff; color: white; grid-column: 1 / 4; padding: 16px; font-size: 1.1rem; }
        .spacer { height: 160px; } 

        /* --- 彈跳視窗共用樣式 --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 100;
            padding: 20px;
        }
        .modal {
            background: #1c1c1e; width: 100%; max-width: 400px;
            border-radius: 12px; padding: 20px; border: 1px solid #3a3a3c;
        }
        .modal h3 { margin-top: 0; color: #fff; text-align: center; }
        .modal p { color: #8e8e93; font-size: 0.95rem; margin-bottom: 15px; white-space: pre-wrap; line-height: 1.4;}
        
        .modal textarea, .modal input[type="text"] {
            width: 100%; background: #000; color: #fff;
            border: 1px solid #3a3a3c; border-radius: 8px; padding: 10px;
            font-size: 1rem; box-sizing: border-box; margin-bottom: 15px; outline: none;
        }
        .modal textarea { height: 150px; resize: none; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btns button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-cancel { background: #3a3a3c; color: #fff; }
        .btn-confirm { background: #34c759; color: #fff; }
    </style>
</head>
<body>

    <h2>叫貨小幫手</h2>

    <!-- 廠商切換區 -->
    <div class="vendor-header">
        <select id="vendor-select" onchange="switchVendor()"></select>
        <button class="btn-vendor" onclick="addVendor()">+ 新增</button>
        <button class="btn-vendor del" onclick="deleteVendor()">刪除</button>
    </div>

    <div id="list-container"></div>
    <div class="spacer"></div>

    <div class="controls">
        <button class="btn btn-reset" onclick="resetQty()">歸零</button>
        <button class="btn btn-import" onclick="openImportModal()">批次匯入</button>
        <button class="btn btn-add" onclick="addItem()">+ 單筆</button>
        <button class="btn btn-copy" onclick="copyText()">複製叫貨單 (自動計價)</button>
    </div>

    <!-- 批次匯入專用視窗 -->
    <div class="modal-overlay" id="import-modal">
        <div class="modal">
            <h3>批次匯入品項</h3>
            <p>請貼上文字，格式範例：<br><span style="color:#FFD60A">筷子 / 3 箱<br>塑膠袋 / 3 卷</span></p>
            <textarea id="import-text" placeholder="貼上文字..."></textarea>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeImportModal()">取消</button>
                <button class="btn-confirm" onclick="processImport()">確認匯入</button>
            </div>
        </div>
    </div>

    <!-- 通用自訂對話框 (取代 alert, confirm, prompt) -->
    <div class="modal-overlay" id="custom-modal">
        <div class="modal">
            <h3 id="modal-title"></h3>
            <p id="modal-message"></p>
            <input type="text" id="modal-input" style="display: none;">
            <div class="modal-btns">
                <button class="btn-cancel" id="modal-cancel">取消</button>
                <button class="btn-confirm" id="modal-confirm">確認</button>
            </div>
        </div>
    </div>

    <script>
        // --- 自訂對話框系統 ---
        let modalConfirmCallback = null;
        function openModal(options) {
            const overlay = document.getElementById('custom-modal');
            const titleEl = document.getElementById('modal-title');
            const msgEl = document.getElementById('modal-message');
            const inputEl = document.getElementById('modal-input');
            const cancelBtn = document.getElementById('modal-cancel');
            const confirmBtn = document.getElementById('modal-confirm');

            titleEl.innerText = options.title || '提示';
            msgEl.innerText = options.message || '';
            
            if (options.type === 'prompt') {
                inputEl.style.display = 'block';
                inputEl.value = '';
                inputEl.placeholder = options.placeholder || '';
                setTimeout(() => inputEl.focus(), 100);
            } else {
                inputEl.style.display = 'none';
            }

            if (options.type === 'alert') {
                cancelBtn.style.display = 'none';
                confirmBtn.innerText = '我知道了';
            } else {
                cancelBtn.style.display = 'block';
                confirmBtn.innerText = '確認';
            }

            modalConfirmCallback = () => {
                overlay.style.display = 'none';
                if (options.onConfirm) {
                    if (options.type === 'prompt') options.onConfirm(inputEl.value);
                    else options.onConfirm();
                }
            };

            cancelBtn.onclick = () => overlay.style.display = 'none';
            confirmBtn.onclick = modalConfirmCallback;
            inputEl.onkeyup = (e) => { if(e.key === 'Enter') modalConfirmCallback(); };

            overlay.style.display = 'flex';
        }


        // --- 資料初始化 ---
        let appData = JSON.parse(localStorage.getItem('orderAppData'));
        if (!appData) {
            let oldItems = JSON.parse(localStorage.getItem('orderItems')) || [
                { name: '塑膠袋', qty: 0, unit: '卷', price: 0 },
                { name: '筷子', qty: 0, unit: '箱', price: 0 },
                { name: '紙碗', qty: 0, unit: '箱', price: 0 }
            ];
            oldItems.forEach(item => { if(item.price === undefined) item.price = 0; });
            appData = { currentVendor: '預設廠商', vendors: { '預設廠商': oldItems } };
        }

        const container = document.getElementById('list-container');
        const vendorSelect = document.getElementById('vendor-select');

        function getItems() { return appData.vendors[appData.currentVendor]; }

        function renderVendorOptions() {
            vendorSelect.innerHTML = '';
            for (let vendor in appData.vendors) {
                let opt = document.createElement('option');
                opt.value = vendor;
                opt.innerText = vendor;
                if (vendor === appData.currentVendor) opt.selected = true;
                vendorSelect.appendChild(opt);
            }
        }

        function render() {
            renderVendorOptions();
            container.innerHTML = '';
            let items = getItems();
            
            if (items.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#8e8e93; padding: 20px;">清單是空的，請新增品項或匯入資料。</div>';
            }

            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                
                // 動態決定數量的樣式
                const qtyClass = item.qty > 0 ? 'active' : 'inactive';

                card.innerHTML = `
                    <div class="row-top">
                        <div class="row-item">
                            <input type="text" value="${item.name}" placeholder="輸入名稱..." onchange="updateItem(${index}, 'name', this.value)">
                        </div>
                        <div class="drag-handle">≡</div>
                    </div>
                    <div class="row-qty">
                        <button class="btn-qty" onclick="changeQty(${index}, -1)">−</button>
                        <div class="qty-display ${qtyClass}">${item.qty}</div>
                        <button class="btn-qty" onclick="changeQty(${index}, 1)">+</button>
                    </div>
                    <div class="row-meta">
                        <input class="meta-input price" type="number" value="${item.price || ''}" placeholder="單價" onchange="updateItem(${index}, 'price', this.value)">
                        <span class="currency-label">元/</span>
                        <input class="meta-input unit" type="text" value="${item.unit}" placeholder="單位" onchange="updateItem(${index}, 'unit', this.value)">
                        <button class="btn-del" onclick="deleteItem(${index})">刪除</button>
                    </div>
                `;
                container.appendChild(card);
            });
            save();
        }

        /* --- 廠商管理功能 --- */
        function switchVendor() {
            appData.currentVendor = vendorSelect.value;
            render();
        }

        function addVendor() {
            openModal({
                type: 'prompt',
                title: '新增廠商',
                message: '請輸入新廠商名稱 (例如: 免洗餐具行)',
                onConfirm: (name) => {
                    if (name && name.trim()) {
                        if (appData.vendors[name]) {
                            openModal({ type: 'alert', title: '錯誤', message: '廠商名稱已存在！' });
                            return;
                        }
                        appData.vendors[name] = [];
                        appData.currentVendor = name;
                        render();
                    }
                }
            });
        }

        function deleteVendor() {
            const keys = Object.keys(appData.vendors);
            if (keys.length <= 1) {
                openModal({ type: 'alert', title: '操作無效', message: '至少要保留一個廠商喔！' });
                return;
            }
            openModal({
                type: 'confirm',
                title: '刪除廠商',
                message: `確定要刪除「${appData.currentVendor}」及旗下所有品項嗎？`,
                onConfirm: () => {
                    delete appData.vendors[appData.currentVendor];
                    appData.currentVendor = Object.keys(appData.vendors)[0];
                    render();
                }
            });
        }

        /* --- 品項操作 --- */
        function updateItem(index, key, value) {
            let items = getItems();
            if (key === 'price') value = value === '' ? 0 : parseFloat(value) || 0;
            items[index][key] = value;
            save();
        }

        function changeQty(index, delta) {
            let items = getItems();
            let newQty = items[index].qty + delta;
            if (newQty < 0) newQty = 0;
            items[index].qty = newQty;
            render();
        }

        function addItem() {
            let items = getItems();
            items.push({ name: '', qty: 0, unit: '', price: 0 });
            render();
            setTimeout(() => {
                const inputs = document.querySelectorAll('.row-item input');
                inputs[inputs.length - 1].focus();
            }, 100);
        }

        function deleteItem(index) {
            openModal({
                type: 'confirm',
                title: '刪除品項',
                message: '確定要刪除這個品項嗎？',
                onConfirm: () => {
                    getItems().splice(index, 1);
                    render();
                }
            });
        }

        function resetQty() {
            openModal({
                type: 'confirm',
                title: '數量歸零',
                message: `確定要將「${appData.currentVendor}」的數量全數歸零嗎？`,
                onConfirm: () => {
                    getItems().forEach(item => item.qty = 0);
                    render();
                }
            });
        }

        function save() {
            localStorage.setItem('orderAppData', JSON.stringify(appData));
        }

        /* --- 匯入功能 --- */
        const importModal = document.getElementById('import-modal');
        function openImportModal() { 
            importModal.style.display = 'flex'; 
            document.getElementById('import-text').focus();
        }
        function closeImportModal() { 
            importModal.style.display = 'none'; 
            document.getElementById('import-text').value = '';
        }

        function processImport() {
            const text = document.getElementById('import-text').value;
            const lines = text.split('\n');
            let items = getItems();
            let addedCount = 0;

            lines.forEach(line => {
                if(!line.trim()) return;
                const parts = line.split('/');
                const name = parts[0].trim();
                let qty = 0, unit = '';
                
                if(parts[1]) {
                    const qtyUnitStr = parts[1].trim();
                    const match = qtyUnitStr.match(/^(\d+(?:\.\d+)?)\s*(.*)$/);
                    if(match) {
                        qty = parseFloat(match[1]);
                        unit = match[2].trim();
                    } else {
                        unit = qtyUnitStr;
                    }
                }
                items.push({ name, qty, unit, price: 0 });
                addedCount++;
            });

            if(addedCount > 0) {
                render();
                openModal({ type: 'alert', title: '匯入成功', message: `成功匯入 ${addedCount} 個品項！` });
            }
            closeImportModal();
        }

        /* --- 複製並計算總價 --- */
        function copyText() {
            const items = getItems();
            const activeItems = items.filter(item => item.qty > 0);
            
            if (activeItems.length === 0) {
                openModal({ type: 'alert', title: '無法複製', message: '目前數量都是 0，無法產生叫貨單喔！' });
                return;
            }
            
            let totalPrice = 0;
            const textToCopy = activeItems.map(item => {
                totalPrice += (item.price || 0) * item.qty;
                return `${item.name} / ${item.qty} ${item.unit}`;
            }).join('\n');
            
            const alertMsg = `💰 本次預估總金額：${totalPrice} 元\n(金額僅供自己核對，不會被複製)\n\n-- 複製的內容 --\n${textToCopy}`;

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    openModal({ type: 'alert', title: '✅ 已複製到剪貼簿！', message: alertMsg });
                }).catch(() => fallbackCopy(textToCopy, alertMsg));
            } else {
                fallbackCopy(textToCopy, alertMsg);
            }
        }
        
        function fallbackCopy(text, alertMsg) {
             const textarea = document.createElement('textarea');
             textarea.value = text;
             document.body.appendChild(textarea);
             textarea.select();
             document.execCommand('copy');
             document.body.removeChild(textarea);
             openModal({ type: 'alert', title: '✅ 已複製到剪貼簿！', message: alertMsg });
        }

        // 初始化
        render();

        // SortableJS 拖曳功能
        new Sortable(container, {
            handle: '.drag-handle',
            animation: 150,
            ghostClass: 'sortable-ghost',
            onEnd: function (evt) {
                let items = getItems();
                const movedItem = items.splice(evt.oldIndex, 1)[0];
                items.splice(evt.newIndex, 0, movedItem);
                save();
                render();
            }
        });
    </script>
</body>
</html>
