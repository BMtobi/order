<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>線上擲筊模擬器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #2c140d;
            background-image: radial-gradient(circle at center, #4a2115 0%, #1a0b06 100%);
            margin: 0;
            overflow: hidden;
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .result-anim {
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        .animate-pulse-slow {
            animation: pulse-slow 2s infinite;
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="h-screen w-screen relative text-neutral-100 flex items-center justify-center">

    <!-- 點擊觸發區域 -->
    <div id="click-area" class="absolute inset-0 z-10 cursor-pointer flex flex-col items-center justify-center" onclick="throwBlocks()">
        <p id="helper-text" class="text-amber-500 text-xl tracking-widest animate-pulse-slow mt-56 pointer-events-none">
            點擊畫面中央擲筊
        </p>
    </div>

    <!-- 筊杯顯示區域 -->
    <div id="blocks-container" class="absolute inset-0 z-0 pointer-events-none flex items-center justify-center gap-4">
        <!-- 筊杯 1 (左) -->
        <div id="block1" class="absolute" style="transform: translate(-40px, 0px) rotate(-15deg) scale(1, 1);">
        </div>
        <!-- 筊杯 2 (右) -->
        <div id="block2" class="absolute" style="transform: translate(40px, 0px) rotate(15deg) scale(-1, 1);">
        </div>
    </div>

    <!-- 結果動畫遮罩 -->
    <div id="result-overlay" class="absolute inset-0 z-20 pointer-events-none flex items-center justify-center hidden">
        <h1 id="result-text" class="text-7xl md:text-9xl font-bold tracking-widest drop-shadow-[0_5px_15px_rgba(0,0,0,0.8)]"></h1>
    </div>

    <!-- 左下角：連續聖筊統計 -->
    <div id="streak-display" class="absolute bottom-6 left-6 z-30 transition-opacity duration-300 opacity-0 pointer-events-none">
        <div class="bg-black/40 backdrop-blur-sm border border-amber-500/50 rounded-lg px-4 py-2 flex items-center gap-2 shadow-lg">
            <span class="text-amber-400 font-bold text-lg">連續聖筊：</span>
            <span id="streak-count" class="text-white font-black text-2xl">0</span>
            <span class="text-amber-400 font-bold text-lg">次</span>
        </div>
    </div>

    <!-- 右下角：紀錄按鈕 -->
    <button onclick="toggleHistory()" class="absolute bottom-6 right-6 z-30 bg-amber-700 hover:bg-amber-600 border border-amber-500 text-white rounded-full h-14 w-14 flex items-center justify-center shadow-[0_4px_15px_rgba(0,0,0,0.6)] transition-transform active:scale-95 focus:outline-none">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
    </button>

    <!-- 歷史紀錄 Modal -->
    <div id="history-modal" class="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-center justify-center hidden transition-opacity">
        <div class="bg-[#3a1d13] border-2 border-amber-700 rounded-xl w-11/12 max-w-sm max-h-[80vh] flex flex-col shadow-2xl relative">
            <div class="p-4 border-b border-amber-800/50 flex justify-between items-center">
                <h2 class="text-xl font-bold text-amber-500 tracking-wider">擲筊紀錄</h2>
                <button onclick="toggleHistory()" class="text-neutral-400 hover:text-white transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div id="history-list" class="p-4 flex-1 overflow-y-auto no-scrollbar space-y-3">
                <p class="text-neutral-500 text-center py-8">目前尚無紀錄</p>
            </div>
            <div class="p-4 border-t border-amber-800/50">
                <button onclick="clearHistory()" class="w-full bg-red-800/80 hover:bg-red-700 text-white font-bold py-3 rounded-lg transition active:scale-95 shadow-md">
                    清除所有紀錄
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- 狀態變數 ---
        let isThrowing = false;
        let historyData = [];
        let consecutiveShengCount = 0;

        // 當前筊杯的位置與旋轉狀態 (使用絕對數值方便累加)
        let b1Rot = -15;
        let b2Rot = 15;
        let b1CurrentTransform = 'translate(-40px, 0px) rotate(-15deg) scale(1, 1)';
        let b2CurrentTransform = 'translate(40px, 0px) rotate(15deg) scale(-1, 1)';

        const block1El = document.getElementById('block1');
        const block2El = document.getElementById('block2');
        const resultOverlay = document.getElementById('result-overlay');
        const resultText = document.getElementById('result-text');
        const helperText = document.getElementById('helper-text');
        const streakDisplay = document.getElementById('streak-display');
        const streakCount = document.getElementById('streak-count');
        const historyModal = document.getElementById('history-modal');
        const historyList = document.getElementById('history-list');

        // 生成厚實版筊杯 SVG
        function getBlockSvg(isFlat) {
            if (isFlat) {
                return `
                <svg viewBox="0 0 140 200" width="115" height="165" class="drop-shadow-md transition-all">
                    <defs>
                        <linearGradient id="flatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#dd2222"/>
                            <stop offset="100%" stop-color="#a31111"/>
                        </linearGradient>
                    </defs>
                    <path d="M 20,10 C 140,40 140,160 20,190 C 45,140 45,60 20,10 Z" fill="url(#flatGrad)" stroke="#5a0000" stroke-width="1.5"/>
                    <path d="M 22,12 C 136,42 136,158 22,188 C 47,140 47,60 22,12 Z" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
                </svg>`;
            } else {
                return `
                <svg viewBox="0 0 140 200" width="115" height="165" class="drop-shadow-2xl transition-all">
                    <path d="M 20,10 C 90,45 90,155 20,190 C 45,140 45,60 20,10 Z" fill="#991414" stroke="#4a0000" stroke-width="1"/>
                    <path d="M 20,10 C 140,40 140,160 20,190 C 90,155 90,45 20,10 Z" fill="#eb3333" stroke="#4a0000" stroke-width="1"/>
                    <path d="M 20,10 C 90,45 90,155 20,190" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="4" filter="blur(1.5px)"/>
                    <path d="M 20,10 C 90,45 90,155 20,190" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
                </svg>`;
            }
        }

        block1El.innerHTML = getBlockSvg(true);
        block2El.innerHTML = getBlockSvg(false);

        function throwBlocks() {
            if (isThrowing) return;
            isThrowing = true;

            helperText.style.display = 'none';
            resultOverlay.classList.add('hidden');
            resultText.className = 'text-7xl md:text-9xl font-bold tracking-widest drop-shadow-[0_5px_15px_rgba(0,0,0,0.8)]'; 

            const b1Result = Math.floor(Math.random() * 2);
            const b2Result = Math.floor(Math.random() * 2);

            let finalResultStr = "";
            let colorClass = "";
            
            if (b1Result !== b2Result) {
                finalResultStr = "聖筊";
                colorClass = "text-yellow-400";
                consecutiveShengCount++; 
            } else if (b1Result === 0 && b2Result === 0) {
                finalResultStr = "笑筊";
                colorClass = "text-gray-300";
                consecutiveShengCount = 0; 
            } else {
                finalResultStr = "無筊";
                colorClass = "text-red-500";
                consecutiveShengCount = 0; 
            }

            // === 10 種隨機動畫設計 ===
            const animType = Math.floor(Math.random() * 10);
            
            // 預設參數
            let dur = 1000;
            let easing = 'cubic-bezier(0.2, 0.9, 0.4, 1)';
            
            // 飛行至最高點的參數
            let b1MidX = -60, b1MidY = -350, b1ScaleX = 1, b1ScaleY = 1;
            let b2MidX = 60, b2MidY = -350, b2ScaleX = -1, b2ScaleY = 1;
            
            // 旋轉總圈數 (度)
            let b1SpinAmount = 720;
            let b2SpinAmount = -720;

            switch(animType) {
                case 0: // 1. 標準拋擲
                    break;
                case 1: // 2. 高拋：飛得非常高，轉速快
                    dur = 1250; b1MidY = -600; b2MidY = -600; 
                    b1SpinAmount = 1080; b2SpinAmount = -1080;
                    break;
                case 2: // 3. 輕巧快拋：飛不高但速度很快
                    dur = 750; b1MidY = -180; b2MidY = -180; 
                    b1SpinAmount = 360; b2SpinAmount = -360; 
                    easing = 'ease-out';
                    break;
                case 3: // 4. 寬距拋擲：兩筊在空中分得很開
                    b1MidX = -160; b2MidX = 160;
                    break;
                case 4: // 5. 交叉飛梭：左筊飛右邊，右筊飛左邊
                    b1MidX = 80; b2MidX = -80; 
                    b1SpinAmount = 900; b2SpinAmount = -900;
                    break;
                case 5: // 6. 輕柔滑落：慢慢轉，輕輕落
                    dur = 1200; b1MidY = -200; b2MidY = -200; 
                    b1SpinAmount = 180; b2SpinAmount = -180; 
                    easing = 'ease-in-out';
                    break;
                case 6: // 7. 不對稱拋擲：一高一低
                    b1MidY = -450; b2MidY = -200; 
                    b1SpinAmount = 900; b2SpinAmount = -360;
                    break;
                case 7: // 8. 暴風旋轉：極高轉速
                    b1SpinAmount = 1440; b2SpinAmount = -1440;
                    break;
                case 8: // 9. 遠拋模擬：利用縮小模擬向遠處拋的空間感
                    b1ScaleX = 0.6; b1ScaleY = 0.6; 
                    b2ScaleX = -0.6; b2ScaleY = 0.6;
                    b1MidY = -250; b2MidY = -250;
                    break;
                case 9: // 10. 漂浮感：滯空時間較長
                    dur = 1400; b1MidY = -400; b2MidY = -400; 
                    easing = 'cubic-bezier(0.1, 0.7, 0.1, 1)';
                    break;
            }

            console.log(`觸發動畫模式: ${animType + 1}`);

            // 更新累積旋轉角度 (加入隨機亂數避免每次落地角度一樣)
            b1Rot += b1SpinAmount + (Math.random() * 60 - 30);
            b2Rot += b2SpinAmount + (Math.random() * 60 - 30);
            
            // 計算最高點的旋轉角度 (大約是總旋轉的一半)
            let b1MidRot = b1Rot - (b1SpinAmount / 2);
            let b2MidRot = b2Rot - (b2SpinAmount / 2);

            // 隨機計算最終落地位置
            const b1LandingX = -50 - Math.random() * 40;
            const b1LandingY = 10 + Math.random() * 40;
            const b2LandingX = 50 + Math.random() * 40;
            const b2LandingY = 10 + Math.random() * 40;

            const b1TargetTransform = `translate(${b1LandingX}px, ${b1LandingY}px) rotate(${b1Rot}deg) scale(1, 1)`;
            const b2TargetTransform = `translate(${b2LandingX}px, ${b2LandingY}px) rotate(${b2Rot}deg) scale(-1, 1)`;

            // 執行 Web Animations API
            const a1 = block1El.animate([
                { transform: b1CurrentTransform },
                { transform: `translate(${b1MidX}px, ${b1MidY}px) rotate(${b1MidRot}deg) scale(${b1ScaleX}, ${b1ScaleY})`, offset: 0.5 },
                { transform: b1TargetTransform }
            ], { duration: dur, easing: easing, fill: 'forwards' });

            const a2 = block2El.animate([
                { transform: b2CurrentTransform },
                { transform: `translate(${b2MidX}px, ${b2MidY}px) rotate(${b2MidRot}deg) scale(${b2ScaleX}, ${b2ScaleY})`, offset: 0.5 },
                { transform: b2TargetTransform }
            ], { duration: dur, easing: easing, fill: 'forwards' });

            // 抓準拋到最高點的時候 (依照 duration 比例)，替換為擲出的正反面
            setTimeout(() => {
                block1El.innerHTML = getBlockSvg(b1Result === 0);
                block2El.innerHTML = getBlockSvg(b2Result === 0);
            }, dur * 0.4);

            // 動畫結束處理
            Promise.all([a1.finished, a2.finished]).then(() => {
                b1CurrentTransform = b1TargetTransform;
                b2CurrentTransform = b2TargetTransform;

                resultText.textContent = finalResultStr;
                resultText.classList.add(colorClass);
                resultOverlay.classList.remove('hidden');
                
                void resultText.offsetWidth; 
                resultText.classList.add('result-anim');

                const timeStr = new Date().toLocaleTimeString('zh-TW', { hour12: false });
                historyData.unshift({ time: timeStr, result: finalResultStr, color: colorClass });
                renderHistoryList();
                updateStreakUI();

                isThrowing = false;
            });
        }

        function updateStreakUI() {
            if (consecutiveShengCount > 0) {
                streakCount.textContent = consecutiveShengCount;
                streakDisplay.classList.remove('opacity-0');
            } else {
                streakDisplay.classList.add('opacity-0');
            }
        }

        function toggleHistory() {
            if (historyModal.classList.contains('hidden')) {
                historyModal.classList.remove('hidden');
            } else {
                historyModal.classList.add('hidden');
            }
        }

        function renderHistoryList() {
            if (historyData.length === 0) {
                historyList.innerHTML = `<p class="text-neutral-500 text-center py-8">目前尚無紀錄</p>`;
                return;
            }
            historyList.innerHTML = historyData.map((item) => `
                <div class="bg-neutral-900/50 rounded-lg p-3 flex justify-between items-center border border-amber-900/30">
                    <span class="text-neutral-400 text-sm">${item.time}</span>
                    <span class="font-bold text-xl ${item.color}">${item.result}</span>
                </div>
            `).join('');
        }

        function clearHistory() {
            historyData = [];
            consecutiveShengCount = 0;
            renderHistoryList();
            updateStreakUI();
            resultOverlay.classList.add('hidden');
            toggleHistory();
        }

    </script>
</body>
</html>
